name: Scrape Kozminski Events

on:
  schedule:
    - cron: '0 6 * * *' # 8:00 Warsaw time (UTC+2)
  workflow_dispatch: # manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger scraper
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.API_URL }}/api/v1/admin/scraper/cron" \
            -H "X-Scraper-Secret: ${{ secrets.SCRAPER_SECRET }}")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "Response code: $http_code"
          echo "$body" | python3 -m json.tool
          echo "$body" | python3 -m json.tool > scraper-result.json
          if [ "$http_code" != "200" ]; then
            echo "Scraper failed with status $http_code"
            exit 1
          fi

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-log-${{ github.run_id }}
          path: scraper-result.json
          retention-days: 90
