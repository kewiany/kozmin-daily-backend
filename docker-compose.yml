version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: unievents
      POSTGRES_PASSWORD: unievents
      POSTGRES_DB: unievents
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://unievents:unievents@db:5432/unievents
      SECRET_KEY: dev-secret-key-change-in-production
    depends_on:
      - db
    volumes:
      - .:/code
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  pgdata:
